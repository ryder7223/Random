<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOR Encrypter/Decrypter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            font-size: 1rem;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: block;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover {
            background: #eaeaea;
        }
        pre {
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            background: #fff;
            margin-top: 20px;
        }
        .copy-button {
            width: auto;
            display: block;
            margin: 10px auto;
            background: #fff;
        }
        .copy-button:hover {
            background: #eaeaea;
        }
        .error {
            color: red;
        }
        .switch-container {
            margin-top: 10px;
        }
        .key-input {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>XOR Encrypter/Decrypter</h1>

    <div class="switch-container">
        <label for="modeSwitch">Mode: </label>
        <select id="modeSwitch" onchange="processInput()">
            <option value="encrypt">Encrypt</option>
            <option value="decrypt">Decrypt</option>
        </select>
    </div>

    <div class="key-input">
        <label for="xorKey">XOR Key:</label>
        <input type="text" id="xorKey" placeholder="Enter key..." oninput="processInput()" style="width: 100%; padding: 10px; font-size: 1rem;">
    </div>

    <label for="inputText">Input:</label>
    <textarea id="inputText" rows="4" placeholder="Enter plain text or Base64..." oninput="processInput()"></textarea>

    <label for="outputText">Output:</label>
    <textarea id="outputText" rows="4" placeholder="Output will be displayed here..." readonly></textarea>

    <div id="errorMessage" class="error"></div>

    <button class="copy-button" onclick="copyResult()">Copy Result</button>
</div>

<script>
    function xorEncryptDecrypt(input, key) {
        const output = [];
        for (let i = 0; i < input.length; i++) {
            const charCode = input.charCodeAt(i) ^ key.charCodeAt(i % key.length);
            output.push(String.fromCharCode(charCode));
        }
        return output.join('');
    }

    function processInput() {
        const inputText = document.getElementById("inputText").value;
        const outputText = document.getElementById("outputText");
        const errorMessage = document.getElementById("errorMessage");
        const key = document.getElementById("xorKey").value;
        const mode = document.getElementById("modeSwitch").value;

        if (!key) {
            errorMessage.textContent = "Key is required.";
            outputText.value = '';
            return;
        }

        try {
            if (mode === "encrypt") {
                const encrypted = xorEncryptDecrypt(inputText, key);
                outputText.value = btoa(encrypted); // Convert to Base64
                errorMessage.textContent = '';
            } else if (mode === "decrypt") {
                if (!/^[A-Za-z0-9+/=]+$/.test(inputText)) {
                    errorMessage.textContent = 'Input is not valid Base64.';
                    outputText.value = '';
                    return;
                }
                const decoded = atob(inputText); // Base64 to string
                outputText.value = xorEncryptDecrypt(decoded, key);
                errorMessage.textContent = '';
            }
        } catch (error) {
            errorMessage.textContent = 'An error occurred during processing.';
            outputText.value = '';
        }
    }

    function copyResult() {
        const outputText = document.getElementById("outputText").value;
        navigator.clipboard.writeText(outputText).then(function () {
        }, function (err) {
        });
    }
</script>

</body>
</html>
