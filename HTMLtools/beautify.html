<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Beautifier</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.7/beautify-html.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/monokai-sublime.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
            color: #333;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        textarea, select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background: #fff;
            cursor: pointer;
        }
        button:hover {
            background: #eaeaea;
        }
        pre {
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            background: #272822;
            color: #f8f8f2;
        }
    </style>
</head>
<body>
    <h1>Multi-Language Beautifier</h1>
    <div class="container">
        <select id="language">
            <option value="javascript">JavaScript</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="python">Python</option>
            <option value="c">C</option>
            <option value="cpp">C++</option>
            <option value="java">Java</option>
            <option value="json">JSON</option>
            <option value="xml">XML</option>
            <option value="bash">Bash</option>
            <option value="sql">SQL</option>
            <option value="php">PHP</option>
            <option value="ruby">Ruby</option>
            <option value="rust">Rust</option>
            <option value="go">Go</option>
        </select>
        <textarea id="input" rows="10" placeholder="Paste your code here..."></textarea>
        <button onclick="beautifyCode()">Beautify</button>
        <pre><code id="output"></code></pre>
        <button onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>
    
    <script>
        function beautifyCode() {
            var inputCode = document.getElementById('input').value;
            var language = document.getElementById('language').value;
            var outputElement = document.getElementById('output');
            let beautifiedCode = inputCode;
            
            if (language === "javascript") {
                beautifiedCode = js_beautify(inputCode, { indent_size: 4 });
            } else if (language === "html") {
                beautifiedCode = html_beautify(inputCode, { indent_size: 4 });
            } else if (language === "css") {
                beautifiedCode = css_beautify(inputCode, { indent_size: 4 });
            }
            
            outputElement.textContent = beautifiedCode;
            outputElement.className = `language-${language}`;
            hljs.highlightElement(outputElement);
        }

        function copyToClipboard() {
            var outputElement = document.getElementById('output');
            var textArea = document.createElement('textarea');
            textArea.value = outputElement.textContent;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
