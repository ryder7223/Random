<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester & Generator</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
    color: #333;
}
h1 { text-align:center; }
.container { max-width:600px; margin:0 auto; }

textarea,select,input{
    width:100%;
    font-size:1rem;
    padding:10px;
    border:1px solid #ccc;
    border-radius:4px;
    display:block;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:4px;
    background:#fff;
    cursor:pointer;
    margin-top:5px;
}

button:hover{ background:#eaeaea; }

pre{
    padding:10px;
    border-radius:4px;
    overflow-x:auto;
    background:#fff;
    margin-top:20px;
}

.copy-button{
    width:auto;
    display:block;
    margin:10px auto;
}

.error{ color:red; }
</style>
</head>
<body>

<div class="container">

<h1>Regex Tester & Generator</h1>

<label>Regex Operation</label>
<select id="operation">
<option>compile</option>
<option>escape</option>
<option>findall</option>
<option>finditer</option>
<option>fullmatch</option>
<option>match</option>
<option>purge</option>
<option>search</option>
<option>split</option>
<option>sub</option>
<option>subn</option>
<option>template</option>
</select>

<label>Regex Flags</label>
<input id="regexFlags" placeholder="gimsyu">

<label>Input String</label>
<textarea id="inputText" rows="4"></textarea>

<label>Regex Pattern</label>
<textarea id="regexPattern" rows="4"></textarea>

<label>Replacement</label>
<input id="replacementText" placeholder="Use \1 \2 \0">

<button onclick="runRegex()">Run</button>

<h3>Result</h3>
<pre id="matchResults"></pre>

<div id="errorMessage" class="error"></div>

<button class="copy-button" onclick="copyResult()">Copy Result</button>

</div>

<script>

let compiledRegex = null;

// Escape regex special characters
function escapeRegex(str){
    return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
}

// Build regex with flags
function buildRegex(pattern,flags){
    return new RegExp(pattern,flags);
}

// Replacement processor for numbered groups and full match
function processReplacement(template, match, groups){
    let usedGroup = false;

    let result = template.replace(/\\0|\\([1-9])/g,(m, num)=>{
        if(m==="\\0"){ usedGroup = true; return match; }
        const idx = parseInt(num);
        if(idx-1 < groups.length && groups[idx-1] !== undefined){ usedGroup=true; return groups[idx-1]; }
        return "";
    });

    // Remove * if a group was used (optional masking logic)
    if(usedGroup) result = result.replace(/\*/g,"");
    return result;
}

function runRegex(){

    const input=document.getElementById("inputText").value;
    const pattern=document.getElementById("regexPattern").value;
    const replacement=document.getElementById("replacementText").value;
    const flags=document.getElementById("regexFlags").value;
    const operation=document.getElementById("operation").value;

    const resultBox=document.getElementById("matchResults");
    const errorBox=document.getElementById("errorMessage");

    resultBox.textContent="";
    errorBox.textContent="";

    try{

        let regex=compiledRegex||buildRegex(pattern,flags||"g");

        switch(operation){

            case "compile":
                compiledRegex=buildRegex(pattern,flags);
                resultBox.textContent="Compiled regex stored.";
            break;

            case "purge":
                compiledRegex=null;
                resultBox.textContent="Compiled regex cache cleared.";
            break;

            case "escape":
                resultBox.textContent=escapeRegex(input);
            break;

            case "findall":
                regex=buildRegex(pattern,flags||"g");
                const all=[...input.matchAll(regex)];
                if(all.length===0){ resultBox.textContent="No matches."; break; }
                resultBox.textContent=all.map(m => m.length>1 ? m.slice(1).map(v=>v??"").join(" | ") : m[0]).join("\n");
            break;

            case "finditer":
                regex=buildRegex(pattern,flags||"g");
                let iterOutput = [];
                for(const m of input.matchAll(regex)){
                    iterOutput.push(`Match "${m[0]}" @ ${m.index} Groups: ${m.slice(1).join(",")}`);
                }
                resultBox.textContent=iterOutput.join("\n")||"No matches.";
            break;

            case "match":
                regex=buildRegex(pattern,flags); // removed ^ prepend
                const mMatch=input.match(regex);
                resultBox.textContent=mMatch?mMatch[0]:"No match.";
            break;

            case "fullmatch":
                regex=buildRegex("^(?:"+pattern+")$",flags);
                resultBox.textContent=regex.test(input)?"Full match":"No full match";
            break;

            case "search":
                regex=buildRegex(pattern,flags);
                const idx=input.search(regex);
                resultBox.textContent=idx!==-1?`Match at index ${idx}`:"No match.";
            break;

            case "split":
                regex=buildRegex(pattern,flags);
                resultBox.textContent=input.split(regex).join("\n");
            break;

            case "sub":
                regex=buildRegex(pattern,flags||"g");
                const subResult=input.replace(regex,(...args)=>{
                    const match=args[0];
                    const groups=args.slice(1,-2);
                    return processReplacement(replacement,match,groups);
                });
                resultBox.textContent=subResult;
            break;

            case "subn":
                regex=buildRegex(pattern,flags||"g");
                let count=0;
                const subnResult=input.replace(regex,(...args)=>{
                    count++;
                    const match=args[0];
                    const groups=args.slice(1,-2);
                    return processReplacement(replacement,match,groups);
                });
                resultBox.textContent=subnResult+"\n\nReplacements: "+count;
            break;

            case "template":
                regex=buildRegex(pattern,flags||"g");
                resultBox.textContent=input.replace(regex,replacement);
            break;

        }

    }catch(err){
        errorBox.textContent="Invalid regular expression.";
    }
}

function copyResult(){
    const text=document.getElementById("matchResults").textContent;
    navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
